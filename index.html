<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Pro Studio V50 | MODÜLER</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div id="login-overlay" style="position:fixed;inset:0;background:rgba(15,23,42,0.95);z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px)">
        <h2 style="color:white">Yönetim Paneli</h2>
        <div style="display:flex;gap:10px">
            <input type="password" id="pin-input" placeholder="****" style="width:200px" onkeypress="if(event.key==='Enter') window.checkPin()">
            <button class="action-btn active" onclick="window.checkPin()">GİRİŞ</button>
        </div>
    </div>
    <div id="toast-container"></div>
    <div id="app-container" style="display:flex;height:100vh;width:100vw;filter:blur(10px)">
        <div id="main-view" style="flex:1;background:#020617;position:relative;overflow:hidden">
            <div class="floating-tools">
                <button class="tool-btn" onclick="window.undo()"><i class="ph ph-arrow-u-up-left"></i></button>
                <button class="tool-btn" onclick="window.redo()"><i class="ph ph-arrow-u-up-right"></i></button>
                <button class="tool-btn" onclick="window.resetZoom()">100%</button>
            </div>
            <div id="zoom-container" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center">
                <div id="svg-wrapper" style="position:relative;background:white">
                    <div id="canvas-inner"></div>
                    <svg id="control-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></svg>
                </div>
            </div>
            <div id="status-bar" style="position:absolute;bottom:0;width:100%;background:#0f172a;padding:5px 20px;font-size:11px;color:#94a3b8;display:flex;justify-content:space-between">
                <span id="status-count">Nesne: 0</span><span id="status-time">Hazır</span>
            </div>
        </div>
        <div id="sidebar">
            <div class="sidebar-scroll-area">
                <div class="action-row">
                    <button onclick="window.saveData()" class="action-btn active">YAYINLA</button>
                    <button onclick="window.addNewSlide()" class="action-btn">YENİ SLAYT</button>
                </div>
                <select id="file-selector" onchange="window.loadSlide()" style="width:100%;padding:10px;margin:10px 0;background:#000;color:white;border-radius:8px"></select>
                <details open><summary>NESNE EKLE</summary>
                    <div class="action-row">
                        <button onclick="window.addNewText()" class="action-btn">YAZI</button>
                        <button onclick="window.addWeather()" class="action-btn">HAVA/SAAT</button>
                        <button onclick="window.addCurrency()" class="action-btn">DÖVİZ</button>
                    </div>
                </details>
                <details open><summary>HIZLI METİN YERLEŞTİRME</summary>
                    <div id="auto-fields-list" style="padding:10px;background:rgba(0,0,0,0.2)"></div>
                </details>
                <details open><summary>KATMANLAR</summary>
                    <div id="layers-list" style="max-height:200px;overflow-y:auto"></div>
                </details>
            </div>
            <div id="editor-fields" style="padding:20px;border-top:1px solid #334155;flex:1;overflow-y:auto"></div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
