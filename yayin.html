<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Yayın Ekranı</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700;800&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Roboto:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🛡️ 1. Adım: Esnemeleri tamamen iptal et, ekranı beton gibi sabitle */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            position: fixed; /* Kiosk browser kayma kalkanı */
        }
        
        #viewer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* GPU hızlandırmayı zorla aç, işlemciyi devre dışı bırak */
            transform: translateZ(0);
            backface-visibility: hidden;
            transition: all 0.5s ease-in-out;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        /* 🛡️ 2. Adım: Android TV'de kaymaya sebep olan flex ve object-fit kodlarını silip mutlak sabitleme getirdik */
        #viewer-container svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* 🛡️ 3. Adım: Sadece yazıların yukarı kaymasını önleyen özel SVG Text kalkanı */
        #viewer-container text {
            text-rendering: geometricPrecision;
            transform: translateZ(0); /* Yazıyı donanıma kilitle */
        }

        /* --- STABİL ÇALIŞAN EFEKTLER (Yüzde yerine VW/VH kullanıldı) --- */
        .out-fade { opacity: 0; } .in-fade { opacity: 0; }
        .out-slide { transform: translateX(-100vw); opacity: 0; } .in-slide { transform: translateX(100vw); opacity: 0; }
        .out-zoom { transform: scale(0); opacity: 0; } .in-zoom { transform: scale(2); opacity: 0; }
        .out-flip { transform: rotateY(-90deg); opacity: 0; } .in-flip { transform: rotateY(90deg); opacity: 0; }
        .out-spin { transform: rotate(180deg) scale(0); opacity: 0; } .in-spin { transform: rotate(-180deg) scale(0); opacity: 0; }
        .out-cube { transform: rotateY(-90deg) translateZ(500px); opacity: 0; } .in-cube { transform: rotateY(90deg) translateZ(500px); opacity: 0; }
        .out-fold { transform: rotateX(-90deg); opacity: 0; } .in-fold { transform: rotateX(90deg); opacity: 0; }
    </style>
</head>
<body>

    <div id="viewer-container"></div>

    <script type="module" src="/src/yayin.js"></script>

</body>
</html>
