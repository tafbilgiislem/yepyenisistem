<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V49 CMS | Kararlı Yayın Motoru</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Poppins:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background: #000; overflow: hidden; position: fixed; 
        }
        
        #viewer-container { 
            position: absolute; inset: 0; 
            perspective: 1200px;
            background: #000;
        }
        
        .slide-layer { 
            position: absolute; inset: 0; 
            opacity: 0; pointer-events: none; 
            visibility: hidden;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: transform, opacity, clip-path;
        }
        
        /* Aktif slaytı görünür kıl */
        .slide-layer.active { 
            opacity: 1; 
            pointer-events: all; 
            visibility: visible;
            z-index: 10; 
        }

        .slide-layer svg { width: 100vw; height: 100vh; object-fit: contain; display: block; }

        /* RSS Haber Bandı Animasyonu */
        @keyframes scrollNews { 
            from { transform: translateX(0); }
            to { transform: translateX(-100%); } 
        }

        /* 🌟 V49 Mega Efektler 🌟 */
        .fade { opacity: 0; } 
        .slide-left { transform: translateX(100%); opacity: 0; }
        .slide-left.active { transform: translateX(0); opacity: 1; }
        .slide-up { transform: translateY(100%); opacity: 0; }
        .slide-up.active { transform: translateY(0); opacity: 1; }
        .zoom { transform: scale(0.8); opacity: 0; }
        .zoom.active { transform: scale(1); opacity: 1; }
        .circle { clip-path: circle(0% at 50% 50%); }
        .circle.active { clip-path: circle(150% at 50% 50%); }
        .cube { transform: rotateY(-90deg) translateZ(500px); opacity: 0; }
        .cube.active { transform: rotateY(0deg) translateZ(0); opacity: 1; }
    </style>
</head>
<body>
    <div id="viewer-container"></div>
    <script type="module" src="/src/yayin.js"></script>
</body>
</html>
