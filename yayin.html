<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Yayın Ekranı</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&family=Montserrat:wght@400;700;800&family=Nunito:wght@400;700&family=Open+Sans:wght@400;700&family=Oswald:wght@400;700&family=Pacifico&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;700&family=Raleway:wght@400;700&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🛡️ ANDROID TV KAYMA KALKANI */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            position: fixed; 
        }
        
        #viewer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* İŞTE SORUN BURADAYDI! Bu kod efektleri eziyordu */
            transform: translateZ(0); 
            backface-visibility: hidden;
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        #viewer-container svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #viewer-container text {
            text-rendering: geometricPrecision;
            transform: translateZ(0); 
        }

        /* --- 🌟 EFEKTLERİ !important İLE ZORLUYORUZ (KESİN ÇÖZÜM) 🌟 --- */
        .out-fade { opacity: 0 !important; } .in-fade { opacity: 0 !important; }
        
        .out-slide-left { transform: translateX(-100vw) !important; opacity: 0 !important; } 
        .in-slide-left { transform: translateX(100vw) !important; opacity: 0 !important; }
        
        .out-slide-up { transform: translateY(-100vh) !important; opacity: 0 !important; } 
        .in-slide-up { transform: translateY(100vh) !important; opacity: 0 !important; }
        
        .out-zoom { transform: scale(1.5) !important; opacity: 0 !important; } 
        .in-zoom { transform: scale(0.5) !important; opacity: 0 !important; }
        
        .out-rotate-zoom { transform: rotate(180deg) scale(1.5) !important; opacity: 0 !important; } 
        .in-rotate-zoom { transform: rotate(-180deg) scale(0.5) !important; opacity: 0 !important; }
        
        .out-circle { clip-path: circle(0% at 50% 50%) !important; opacity: 0 !important; } 
        .in-circle { clip-path: circle(0% at 50% 50%) !important; opacity: 0 !important; }
        
        .out-wave { transform: translateY(-100vh) rotate(-10deg) !important; opacity: 0 !important; } 
        .in-wave { transform: translateY(100vh) rotate(10deg) !important; opacity: 0 !important; }
        
        .out-curtain { clip-path: inset(0 50% 0 50%) !important; opacity: 0 !important; } 
        .in-curtain { clip-path: inset(0 50% 0 50%) !important; opacity: 0 !important; }
        
        .out-spin-zoom { transform: scale(2) rotate(360deg) !important; opacity: 0 !important; } 
        .in-spin-zoom { transform: scale(0.2) rotate(-360deg) !important; opacity: 0 !important; }
        
        .out-rotate3d { transform: rotate3d(1,1,0,-90deg) !important; opacity: 0 !important; } 
        .in-rotate3d { transform: rotate3d(1,1,0,90deg) !important; opacity: 0 !important; }
        
        .out-cinematic-cube { transform: rotateY(-180deg) scale(.5) !important; opacity: 0 !important; } 
        .in-cinematic-cube { transform: rotateY(180deg) scale(.5) !important; opacity: 0 !important; }

        .out-slide { transform: translateX(-100vw) !important; opacity: 0 !important; } 
        .in-slide { transform: translateX(100vw) !important; opacity: 0 !important; }
        
        .out-flip { transform: rotateY(-90deg) !important; opacity: 0 !important; } 
        .in-flip { transform: rotateY(90deg) !important; opacity: 0 !important; }
        
        .out-spin { transform: rotate(180deg) scale(0) !important; opacity: 0 !important; } 
        .in-spin { transform: rotate(-180deg) scale(0) !important; opacity: 0 !important; }
        
        .out-cube { transform: rotateY(-90deg) translateZ(500px) !important; opacity: 0 !important; } 
        .in-cube { transform: rotateY(90deg) translateZ(500px) !important; opacity: 0 !important; }
        
        .out-fold { transform: rotateX(-90deg) !important; opacity: 0 !important; } 
        .in-fold { transform: rotateX(90deg) !important; opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="viewer-container"></div>

    <script type="module" src="/src/yayin.js"></script>

</body>
</html>
